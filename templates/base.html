<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estacionamento Campus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1>🅿️ Estacionamento do Campus</h1>
            <div class="header-status">
                <span id="status-conexao" class="status-badge online">🟢 Online</span>
                <span id="ultima-atualizacao" class="timestamp">--</span>
            </div>
        </div>
    </header>

    <!-- Conteudo principal -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>Engenharia de Software 2026/1 — Aplicativo de Estacionamento no Campus</p>
    </footer>

    <script src="{{ url_for('static', filename='js/mapa.js') }}"></script>
</body>
</html>

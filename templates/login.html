<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if modo == 'registro' %}Criar Conta{% else %}Entrar{% endif %} — Estacionamento Campus</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 30%, #fbcfe8 70%, #f9a8d4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(190, 24, 93, 0.08), 0 1px 4px rgba(0,0,0,0.04);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .logo svg {
            width: 48px;
            height: 48px;
            color: #be185d;
        }
        .logo h1 { font-size: 1.3rem; color: #1a1a2e; margin-top: .5rem; }
        .logo p  { font-size: .85rem; color: #9ca3af; margin-top: .25rem; }

        .erro {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            border-radius: 8px;
            padding: .75rem 1rem;
            margin-bottom: 1rem;
            font-size: .85rem;
            color: #dc2626;
        }

        label {
            display: block;
            font-size: .82rem;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: .3rem;
            text-transform: uppercase;
            letter-spacing: .3px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: .7rem 1rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: .95rem;
            margin-bottom: 1rem;
            transition: border-color .2s, box-shadow .2s;
            outline: none;
            background: #fafafa;
        }
        input:focus, select:focus {
            border-color: #ec4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
            background: #fff;
        }

        .btn-primary {
            width: 100%;
            padding: .8rem;
            background: linear-gradient(135deg, #ec4899, #be185d);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:active { transform: scale(0.98); }

        .btn-secundario {
            width: 100%;
            padding: .7rem;
            background: transparent;
            color: #6b7280;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: .9rem;
            cursor: pointer;
            margin-top: .75rem;
            transition: border-color .2s, color .2s;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        .btn-secundario:hover { border-color: #ec4899; color: #be185d; }

        .divisor {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin: 1.25rem 0;
            color: #d1d5db;
            font-size: .8rem;
        }
        .divisor::before, .divisor::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .link-alterar {
            text-align: center;
            margin-top: 1.2rem;
            font-size: .85rem;
            color: #9ca3af;
        }
        .link-alterar a { color: #ec4899; text-decoration: none; font-weight: 600; }
        .link-alterar a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><text x="12" y="16" text-anchor="middle" font-size="12" fill="currentColor" stroke="none" font-weight="700">P</text></svg>
        <h1>Estacionamento Campus</h1>
        <p>{% if modo == 'registro' %}Crie sua conta para acessar{% else %}Entre para continuar{% endif %}</p>
    </div>

    {% if erro %}
    <div class="erro">{{ erro }}</div>
    {% endif %}

    {% if modo == 'registro' %}
    <form method="POST" action="/auth/registrar">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>

        <label for="tipo">Perfil</label>
        <select id="tipo" name="tipo">
            <option value="aluno">Aluno</option>
            <option value="funcionario">Funcionario</option>
        </select>

        <button type="submit" class="btn-primary">Criar conta</button>
        <a href="/auth/login" class="btn-secundario">Ja tenho conta</a>
    </form>

    {% else %}
    <form method="POST" action="/auth/login">
        <input type="hidden" name="next_url" value="{{ next_url or '/' }}">

        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               value="{{ email or '' }}"
               placeholder="seu@email.com" required autofocus>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Sua senha" required>

        <button type="submit" class="btn-primary">Entrar</button>
    </form>

    <div class="divisor">ou</div>
    <a href="/auth/registrar" class="btn-secundario">Criar conta</a>
    {% endif %}
</div>
</body>
</html>
